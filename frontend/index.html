<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Todo Neon Board</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>Smart Todo</h1>
          <p>Neon board with draggable flash cards</p>
        </div>
        <nav class="nav">
          <button id="navLogin" class="tab active" data-view="login">
            Login
          </button>
          <button id="navRegister" class="tab" data-view="register">
            Register
          </button>
          <button id="navBoard" class="tab" data-view="board">Board</button>
          <button id="logoutBtn" class="tab ghost">Logout</button>
        </nav>
      </header>

      <section id="view-login" class="view active">
        <h2>Login</h2>
        <div class="form-grid narrow">
          <label for="l_email">Email</label>
          <input id="l_email" type="email" placeholder="you@example.com" />
          <label for="l_pass">Password</label>
          <input id="l_pass" type="password" placeholder="Your password" />
          <div class="action-row">
            <button id="loginBtn" class="btn primary">Login</button>
            <button class="btn soft" data-view="register">
              Create account
            </button>
          </div>
          <p id="loginStatus" class="status"></p>
        </div>
      </section>

      <section id="view-register" class="view">
        <h2>Register</h2>
        <div class="form-grid narrow">
          <label for="r_email">Email</label>
          <input id="r_email" type="email" placeholder="you@example.com" />
          <label for="r_pass">Password</label>
          <input id="r_pass" type="password" placeholder="Create password" />
          <div class="action-row">
            <button id="registerBtn" class="btn primary">Register</button>
            <button class="btn soft" data-view="login">Back to login</button>
          </div>
          <p id="registerStatus" class="status"></p>
        </div>
      </section>

      <section id="view-board" class="view">
        <div class="board-layout">
          <aside class="panel controls">
            <h3>Create Task</h3>
            <div class="form-grid">
              <label for="c_title">Title</label>
              <input id="c_title" placeholder="Task title" />
              <label for="c_description">Description</label>
              <textarea
                id="c_description"
                placeholder="Optional details"
              ></textarea>
              <label for="c_deadline">Deadline</label>
              <input id="c_deadline" type="datetime-local" />
              <label for="c_parent_id">Parent Task (optional)</label>
              <select id="c_parent_id">
                <option value="">No parent</option>
              </select>
              <div class="action-row">
                <button id="createBtn" class="btn primary">Create</button>
                <button id="clearCreateBtn" class="btn soft">Clear</button>
              </div>
            </div>

            <hr />

            <h3>Edit Task</h3>
            <div class="form-grid">
              <label for="e_id">Task ID</label>
              <input id="e_id" disabled placeholder="Select a card" />
              <label for="e_title">Title</label>
              <input id="e_title" placeholder="Task title" />
              <label for="e_description">Description</label>
              <textarea id="e_description" placeholder="Description"></textarea>
              <label class="inline-check">
                <input id="e_completed" type="checkbox" />
                Completed
              </label>
              <div class="action-row">
                <button id="updateBtn" class="btn primary">Update</button>
                <button id="cancelEditBtn" class="btn soft">Cancel</button>
              </div>
            </div>
          </aside>

          <section class="panel board-panel">
            <div class="board-header">
              <h2>Kanban Flash Board</h2>
              <div class="action-row">
                <button id="refreshBtn" class="btn soft">Refresh</button>
                <button id="clearParentsBtn" class="btn danger">
                  Clear Finished Parents
                </button>
              </div>
            </div>
            <p class="hint">Drag cards between columns to change status.</p>

            <div class="kanban">
              <div class="lane" data-lane="active">
                <div class="lane-head">
                  <h3>Active</h3>
                  <span id="activeCount" class="count">0</span>
                </div>
                <div id="activeLane" class="lane-dropzone"></div>
              </div>

              <div class="lane" data-lane="finished">
                <div class="lane-head">
                  <h3>Finished</h3>
                  <span id="finishedCount" class="count">0</span>
                </div>
                <div id="finishedLane" class="lane-dropzone"></div>
              </div>
            </div>

            <p id="boardStatus" class="status"></p>
          </section>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
